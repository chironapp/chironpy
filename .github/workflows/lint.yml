name: Lint
on: [push, pull_request]

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --group dev
      - name: Check formatting
        run: uv run ruff format --check chironpy/ tests/ examples/
      - name: Check linting
        run: uv run ruff check chironpy/ tests/ examples/
